<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THERASSISTANT — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
  .fp-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 20px;
  }
  #status-msg {
    font-size: 14px; text-align: center; margin-bottom: 14px;
    padding: 10px 14px; border-radius: 8px; display: none;
  }
  #status-msg.success {
    background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534;
  }
  #status-msg.error {
    background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
  }
  .back-link {
    display: block; text-align: center; margin-top: 18px;
    font-size: 13px; color: #6b7280; text-decoration: none;
  }
  .back-link:hover { color: #111; }
  .success-checkmark {
    display: none; text-align: center; padding: 24px 0 8px;
  }
  .success-checkmark .check-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: #dcfce7; display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 14px;
  }
  .success-checkmark h3 { margin: 0 0 8px; font-family: 'Sora', sans-serif; font-size: 18px; color: #111; }
  .success-checkmark p { font-size: 13px; color: #6b7280; line-height: 1.6; margin: 0 0 20px; }
</style>

<script>
'use strict';

const SUPABASE_URL = "https://kozdkixjhtbfhktpvzvk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvemRraXhqaHRiZmhrdHB2enZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTczMzUsImV4cCI6MjA4ODMzMzMzNX0.Wun2eWG5vRdPdkb2c_lsSfTcQ9Y5jJ42kvWGYRgRBVc";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  if (!el) return;
  el.textContent = msg;
  el.className = type || '';
  el.style.display = msg ? 'block' : 'none';
}

async function sendResetEmail(event) {
  event.preventDefault();
  setStatus('');

  const email = document.getElementById('email').value.trim();
  if (!email) {
    setStatus('Please enter your email address.', 'error');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    // redirectTo must point to the page that handles the recovery token
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/app/reset-password.html',
    });

    // Always show success message to avoid email enumeration
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-area').style.display = 'block';

    // Silently log any error — we do not expose it to the user
    if (error) console.warn('resetPasswordForEmail:', error.message);

  } catch (err) {
    setStatus('An unexpected error occurred. Please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}
</script>
</head>

<body class="login-body">

<main class="login-shell" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <section class="login-form-panel" style="flex:1; max-width:440px; margin:auto; padding:32px 16px;">
    <div class="login-card">

      <div class="fp-icon">&#128274;</div>
      <h2 style="text-align:center; margin-bottom:6px;">Reset Your Password</h2>
      <p style="text-align:center; font-size:14px; color:#6b7280; margin-bottom:24px;">
        Enter your email and we'll send you a link to reset your password.
      </p>

      <div id="status-msg"></div>

      <!-- ── Form ─────────────────────────────────────────────────── -->
      <div id="form-area">
        <form onsubmit="sendResetEmail(event)" novalidate>
          <label class="field-label" for="email">Email Address</label>
          <input
            id="email"
            class="field-input"
            type="email"
            placeholder="you@clinic.org"
            autocomplete="email"
            required
            style="margin-bottom:20px;"
          >
          <button id="submit-btn" class="btn-primary" type="submit" style="width:100%;">
            Send Reset Link
          </button>
        </form>
      </div>

      <!-- ── Success state ─────────────────────────────────────────── -->
      <div id="success-area" class="success-checkmark">
        <div class="check-icon">&#10003;</div>
        <h3>Check your email</h3>
        <p>
          If an account exists for that address, we've sent a password reset link.
          The link expires in 1 hour.
        </p>
        <a class="btn-primary" href="login.html" style="display:block; text-align:center; text-decoration:none;">
          Back to login
        </a>
      </div>

      <a class="back-link" href="login.html">&larr; Back to login</a>
    </div>
  </section>
</main>

</body>
</html>
