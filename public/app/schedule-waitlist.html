<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist - Redirecting</title>
</head>
<body>
  <p>Redirecting to <a id="redirectLink" href="admin-waitlist.html">Waitlist</a>...</p>
  <script>
  (function () {
    var current = new URL(window.location.href);
    var target = new URL("admin-waitlist.html", current.href);
    target.search = current.search;
    target.hash = current.hash;
    document.getElementById("redirectLink").href = target.toString();
    window.location.replace(target.toString());
  }());
  </script>
</body>
</html>
