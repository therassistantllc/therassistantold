name: Backend Workflow Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_claim_readiness:
        description: "Run claim readiness workflow test; requires 837P claim tables in Supabase"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_837p_batch:
        description: "Run 837P batch workflow test; requires a ready_for_batch claim"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_837p_submission:
        description: "Run 837P submission tracking test; requires a generated 837P batch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_999_ack:
        description: "Run 999 acknowledgement intake test; requires a submitted 837P batch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_277ca_ack:
        description: "Run 277CA acknowledgement intake test; requires an accepted_999 or submitted 837P batch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate-backend:
    name: Validate backend workflows
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ORGANIZATION_ID: ${{ secrets.NEXT_PUBLIC_ORGANIZATION_ID }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local for backend workflow tests
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_ORGANIZATION_ID=${{ secrets.NEXT_PUBLIC_ORGANIZATION_ID }}" >> .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Validate migration filenames
        run: npm run check:migrations

      - name: Run client import workflow test
        run: npm run test:client-import

      - name: Run eligibility workflow test
        run: npm run test:eligibility

      - name: Run claim readiness workflow test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_claim_readiness == 'true' }}
        run: npm run test:claim-readiness

      - name: Run 837P batch workflow test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_837p_batch == 'true' }}
        run: npm run test:837p-batch

      - name: Run 837P submission workflow test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_837p_submission == 'true' }}
        run: npm run test:837p-submission

      - name: Run 999 acknowledgement workflow test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_999_ack == 'true' }}
        run: npm run test:999-ack

      - name: Run 277CA acknowledgement workflow test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_277ca_ack == 'true' }}
        run: npm run test:277ca-ack

      - name: Build application
        run: npm run build

      - name: Run lint
        run: npm run lint
